<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Net Up — E-posta Doğrulama</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #2D0F7F 0%, #5B2ECC 50%, #7C4DFF 100%);
      color: #fff; padding: 24px;
    }
    .card {
      background: rgba(26, 20, 56, 0.72); border: 1px solid #2D2560;
      border-radius: 24px; padding: 36px 28px; max-width: 380px; width: 100%;
      text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }
    .icon { font-size: 56px; margin-bottom: 14px; }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 10px; }
    p { font-size: 15px; line-height: 1.6; color: #D6CFF5; }
    .spinner {
      width: 42px; height: 42px; border: 4px solid rgba(255,255,255,0.25);
      border-top-color: #FFB800; border-radius: 50%; margin: 8px auto 18px;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hint { margin-top: 18px; font-size: 13px; color: #9B93C4; }
    .ok h1 { color: #00E676; }
    .err h1 { color: #FF6B6B; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="spinner" id="spinner"></div>
    <h1 id="title">Doğrulanıyor…</h1>
    <p id="msg">E-postanı doğruluyoruz, bir saniye.</p>
    <p class="hint" id="hint"></p>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://mokhtlaraelgdtaxgoqv.supabase.co';
    const SUPABASE_ANON = 'sb_publishable_hF6-E440x9vUkgs2c0AJQA_DFfvXEOo';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON, {
      auth: { detectSessionInUrl: false, persistSession: false, autoRefreshToken: false, flowType: 'implicit' },
    });

    const card = document.getElementById('card');
    const spinner = document.getElementById('spinner');
    const title = document.getElementById('title');
    const msg = document.getElementById('msg');
    const hint = document.getElementById('hint');

    function show(state, emoji, t, m, h) {
      spinner.style.display = 'none';
      card.classList.add(state);
      card.innerHTML =
        '<div class="icon">' + emoji + '</div>' +
        '<h1>' + t + '</h1>' +
        '<p>' + m + '</p>' +
        (h ? '<p class="hint">' + h + '</p>' : '');
      card.classList.add(state);
    }

    async function run() {
      try {
        // E-posta şablonu token_hash ile gelir: verifyOtp server-side doğrular (PKCE gerekmez)
        const params = new URLSearchParams(window.location.search);
        const tokenHash = params.get('token_hash');
        const type = params.get('type') || 'magiclink';

        let user = null;
        if (tokenHash) {
          const { data, error } = await supabase.auth.verifyOtp({ token_hash: tokenHash, type });
          if (error || !data || !data.user) {
            show('err', '⚠️', 'Bağlantı geçersiz',
              'Bu doğrulama bağlantısı geçersiz veya süresi dolmuş olabilir. Uygulamadan yeni bir bağlantı iste.',
              error && error.message ? error.message : '');
            return;
          }
          user = data.user;
        } else {
          // Yedek: implicit akış (hash içinde token)
          const { data } = await supabase.auth.getSession();
          user = data && data.session ? data.session.user : null;
        }
        if (!user) {
          show('err', '⚠️', 'Bağlantı geçersiz',
            'Bu doğrulama bağlantısı geçersiz veya süresi dolmuş olabilir. Uygulamadan yeni bir bağlantı iste.',
            '');
          return;
        }
        const uid = user.id;
        const { error } = await supabase
          .from('profiles')
          .update({ email_verified: true })
          .eq('user_id', uid);
        if (error) {
          show('err', '⚠️', 'Bir sorun oldu',
            'Doğrulama kaydedilemedi. Lütfen tekrar dene.',
            error.message || '');
          return;
        }
        // Oturumu bu tarayıcıda bırakma
        await supabase.auth.signOut();
        show('ok', '✅', 'E-postan doğrulandı!',
          'Harika! Artık Net Up hesabın tam yetkili. Uygulamaya geri dönebilirsin.',
          'Bu sekmeyi kapatıp Net Up uygulamasını aç.');
      } catch (e) {
        show('err', '⚠️', 'Bir sorun oldu',
          'Doğrulama tamamlanamadı. Lütfen uygulamadan tekrar dene.',
          (e && e.message) ? e.message : '');
      }
    }
    run();
  </script>
</body>
</html>
